<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bagatellgrenze Mehrarbeit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;--color-surface-offset:#f3f0ec;
      --color-border:#d4d1ca;--color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#6d6b66;
      --color-text-faint:#9f9d96;--color-text-inverse:#f9f8f4;--color-primary:#01696f;--color-primary-hover:#0c4e54;
      --color-primary-highlight:#d7e7e4;--color-error:#a12c7b;--color-warning:#964219;--color-success:#437a22;
      --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.9rem;--radius-xl:1.1rem;--radius-full:9999px;
      --shadow-sm:0 1px 2px rgba(20,18,14,.06);--shadow-md:0 8px 24px rgba(20,18,14,.08);
      --space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-12:3rem;
      --text-xs:.8rem;--text-sm:.95rem;--text-base:1rem;--text-lg:1.15rem;--text-xl:1.65rem;
      --font-body:'Instrument Sans',system-ui,sans-serif;--font-display:'Fraunces',Georgia,serif;
    }
    [data-theme="dark"]{
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;--color-surface-offset:#23211f;
      --color-border:#393836;--color-divider:#262523;--color-text:#e2dfda;--color-text-muted:#afaca6;
      --color-text-faint:#7c7973;--color-text-inverse:#201e1c;--color-primary:#58a3ac;--color-primary-hover:#6bb8c2;
      --color-primary-highlight:#263536;--color-error:#d163a7;--color-warning:#d18e62;--color-success:#82bb61;
      --shadow-sm:0 1px 2px rgba(0,0,0,.18);--shadow-md:0 8px 24px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    html{-webkit-text-size-adjust:none;text-size-adjust:none}
    body{margin:0;font-family:var(--font-body);font-size:var(--text-base);background:var(--color-bg);color:var(--color-text);line-height:1.5}
    button,input,select,textarea{font:inherit} button{cursor:pointer} a{color:inherit}
    .app{max-width:1400px;margin:0 auto;padding:var(--space-6)}
    .topbar{display:flex;justify-content:space-between;gap:var(--space-4);align-items:flex-start;margin-bottom:var(--space-6)}
    .brand{display:flex;gap:var(--space-4);align-items:center}
    .logo{width:44px;height:44px;border-radius:14px;background:var(--color-surface);border:1px solid var(--color-border);display:grid;place-items:center;box-shadow:var(--shadow-sm)}
    .logo svg{width:26px;height:26px}
    .title h1{margin:0;font-family:var(--font-display);font-size:clamp(1.8rem,2.6vw,2.5rem)}
    .title p{margin:.25rem 0 0;color:var(--color-text-muted);max-width:75ch}
    .toolbar{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center}
    .button,.ghost,.danger{min-height:44px;border-radius:var(--radius-full);padding:.75rem 1rem;border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text)}
    .button.primary{background:var(--color-primary);color:var(--color-text-inverse);border-color:transparent}
    .button.primary:hover{background:var(--color-primary-hover)}
    .danger{color:var(--color-error)}
    .shell{display:grid;grid-template-columns:280px 1fr;gap:var(--space-6)}
    .sidebar,.panel,.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm)}
    .sidebar{padding:var(--space-4);position:sticky;top:1rem;height:max-content}
    .main{display:grid;gap:var(--space-6)}
    .nav-group{display:grid;gap:.5rem;margin-top:var(--space-4)}
    .nav-btn{width:100%;text-align:left;border:none;background:transparent;padding:.8rem .9rem;border-radius:var(--radius-lg);color:var(--color-text)}
    .nav-btn.active{background:var(--color-primary-highlight);color:var(--color-primary);font-weight:700}
    .panel{padding:var(--space-5)}
    .grid{display:grid;gap:var(--space-5)}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:var(--space-4)}
    .stat{padding:var(--space-4);background:var(--color-surface-2);border:1px solid var(--color-border);border-radius:var(--radius-lg)}
    .stat .k{font-size:var(--text-xs);letter-spacing:.04em;text-transform:uppercase;color:var(--color-text-muted)}
    .stat .v{font-size:1.6rem;font-weight:700;margin-top:.3rem}
    .section-head{display:flex;justify-content:space-between;gap:var(--space-4);align-items:flex-start;margin-bottom:var(--space-4)}
    .section-head h2{margin:0;font-size:var(--text-xl);font-family:var(--font-display)}
    .section-head p{margin:.35rem 0 0;color:var(--color-text-muted)}
    label{display:grid;gap:.45rem;font-size:var(--text-sm);font-weight:600}
    input,select,textarea{width:100%;padding:.8rem .9rem;border-radius:var(--radius-lg);border:1px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text)}
    input[readonly]{background:var(--color-surface-offset);color:var(--color-text-muted);cursor:default}
    textarea{min-height:96px;resize:vertical}
    .inline-note,.helper{font-size:var(--text-sm);color:var(--color-text-muted)}
    .pill{display:inline-flex;align-items:center;border-radius:var(--radius-full);padding:.35rem .7rem;background:var(--color-primary-highlight);color:var(--color-primary);font-size:var(--text-xs);font-weight:700}
    .table-wrap{overflow-x:auto;border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-surface-2)}
    table{width:100%;border-collapse:collapse;min-width:900px}
    th,td{padding:.9rem;border-bottom:1px solid var(--color-divider);text-align:left;vertical-align:top}
    th{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-muted)}
    tr.selected{background:var(--color-primary-highlight)} tr:hover{background:rgba(1,105,111,.05)}
    .small-actions{display:flex;gap:.5rem;flex-wrap:wrap}
    .small-actions button{padding:.45rem .7rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface)}
    .row-muted{color:var(--color-text-muted)} .positive{color:var(--color-success);font-weight:700}
    .warn{color:var(--color-warning);font-weight:700} .err{color:var(--color-error);font-weight:700}
    .status-card{border-radius:var(--radius-lg);padding:var(--space-4);border:1px solid var(--color-border);background:var(--color-surface-2)}
    .status-neutral{background:var(--color-surface-2);color:var(--color-text)}
    .status-go{background:color-mix(in srgb,var(--color-success) 14%,var(--color-surface));color:var(--color-success);border-color:color-mix(in srgb,var(--color-success) 28%,var(--color-border))}
    .quick-add{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:var(--space-2)}
    .quick-add button{min-height:44px;padding:.5rem .75rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);font-weight:600}
    .import-report{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--space-4)}
    .hidden{display:none !important}
    .banner{padding:var(--space-4);border-radius:var(--radius-lg);background:var(--color-primary-highlight);color:var(--color-primary);border:1px solid color-mix(in srgb,var(--color-primary) 18%,transparent)}
    .conflict-box{padding:var(--space-4);border:1px dashed var(--color-warning);border-radius:var(--radius-lg);background:color-mix(in srgb,var(--color-warning) 10%,var(--color-surface))}
    .footer-note{margin-top:var(--space-4);font-size:var(--text-sm);color:var(--color-text-muted)}
    .filter-bar{display:flex;gap:var(--space-3);flex-wrap:wrap;align-items:center;margin-bottom:var(--space-4)}
    .filter-bar select{width:auto;min-width:180px;padding:.5rem .75rem}
    .abrechnung-hinweis{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:var(--space-2);font-style:italic}
    .month-nav{display:flex;align-items:center;gap:var(--space-2)}
    .month-nav input[type="month"]{width:auto;min-width:150px}
    .month-nav button{min-height:44px;padding:.5rem .9rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface)}
    @media(max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:static}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.two,.grid.three{grid-template-columns:1fr}}
    @media(max-width:700px){.app{padding:var(--space-4)}.topbar{flex-direction:column}.stats{grid-template-columns:1fr}.table-wrap::before{content:'Tabelle seitlich wischen';display:block;padding:.75rem .9rem;font-size:var(--text-xs);color:var(--color-text-muted);border-bottom:1px solid var(--color-divider)}}
  </style>
</head>
<body>
<div class="app">
    <div class="topbar">
      <h1>Bagatellgrenze Mehrarbeit</h1>
      <button onclick="toggleTheme()" class="small-actions">☀️/🌙</button>
    </div>

    <div class="month-nav">
      <button onclick="changeMonth(-1)">◀ Voriger Monat</button>
      <input type="month" id="monthInput" onchange="loadMonth()">
      <button onclick="changeMonth(1)">Nächster Monat ▶</button>
    </div>

    <div class="stats">
      <div class="status-card">
        <div class="status-neutral">Gesamtstunden</div>
        <h2 id="totalHours">0,00</h2>
      </div>
      <div class="status-card">
        <div class="status-go" id="statusText">Unter Grenze</div>
        <h2 id="remainingHours">20,00</h2>
      </div>
    </div>

    <div class="banner hidden" id="warningBanner">
      ⚠️ Achtung: Die Bagatellgrenze von 20 Stunden wird bald erreicht!
    </div>

    <div class="quick-add">
      <input type="number" step="0.5" id="quickHours" placeholder="Stunden">
      <input type="text" id="quickNote" placeholder="Notiz (optional)">
      <button onclick="quickAdd()">+ Schnell hinzufügen</button>
    </div>

    <div class="table-wrap">
      <table id="hoursTable">
        <thead>
          <tr>
            <th>Datum</th>
            <th>Stunden</th>
            <th>Notiz</th>
            <th>Aktion</th>
          </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
      </table>
    </div>

    <div class="footer-note">
      💡 Bagatellgrenze: Bis zu 20 Stunden Mehrarbeit pro Monat sind zulässig.
    </div>
  </div>

  <script>
    let currentMonth = new Date();
    let entries = JSON.parse(localStorage.getItem('entries')) || {};

    function init() {
      const now = new Date();
      currentMonth = new Date(now.getFullYear(), now.getMonth(), 1);
      document.getElementById('monthInput').valueAsDate = currentMonth;
      loadMonth();
      
      const savedTheme = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const newTheme = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    }

    function changeMonth(delta) {
      currentMonth.setMonth(currentMonth.getMonth() + delta);
      document.getElementById('monthInput').valueAsDate = new Date(currentMonth);
      loadMonth();
    }

    function loadMonth() {
      const input = document.getElementById('monthInput');
      if (input.value) {
        currentMonth = new Date(input.value + '-01');
      }
      
      const key = getMonthKey();
      const monthEntries = entries[key] || [];
      
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      
      monthEntries.forEach((entry, index) => {
        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${entry.date}</td>
          <td>${entry.hours.toFixed(2)}</td>
          <td>${entry.note || ''}</td>
          <td><button class="small-actions" onclick="deleteEntry(${index})">❌</button></td>
        `;
      });
      
      updateStats();
    }

    function getMonthKey() {
      return currentMonth.getFullYear() + '-' + String(currentMonth.getMonth() + 1).padStart(2, '0');
    }

    function quickAdd() {
      const hours = parseFloat(document.getElementById('quickHours').value);
      const note = document.getElementById('quickNote').value;
      
      if (!hours || hours <= 0) {
        alert('Bitte geben Sie gültige Stunden ein.');
        return;
      }
      
      const key = getMonthKey();
      if (!entries[key]) entries[key] = [];
      
      const today = new Date().toISOString().split('T')[0];
      entries[key].push({ date: today, hours, note });
      
      localStorage.setItem('entries', JSON.stringify(entries));
      
      document.getElementById('quickHours').value = '';
      document.getElementById('quickNote').value = '';
      
      loadMonth();
    }

    function deleteEntry(index) {
      const key = getMonthKey();
      entries[key].splice(index, 1);
      localStorage.setItem('entries', JSON.stringify(entries));
      loadMonth();
    }

    function updateStats() {
      const key = getMonthKey();
      const monthEntries = entries[key] || [];
      
      const total = monthEntries.reduce((sum, e) => sum + e.hours, 0);
      const remaining = 20 - total;
      
      document.getElementById('totalHours').textContent = total.toFixed(2);
      document.getElementById('remainingHours').textContent = Math.abs(remaining).toFixed(2);
      
      const statusDiv = document.getElementById('statusText');
      const banner = document.getElementById('warningBanner');
      
      if (remaining > 5) {
        statusDiv.className = 'status-go';
        statusDiv.textContent = 'Unter Grenze';
        banner.classList.add('hidden');
      } else if (remaining > 0) {
        statusDiv.className = 'status-neutral';
        statusDiv.textContent = 'Noch verfügbar';
        banner.classList.remove('hidden');
      } else {
        statusDiv.className = 'status-card';
        statusDiv.style.background = 'var(--color-error)';
        statusDiv.textContent = 'Grenze überschritten!';
        banner.classList.remove('hidden');
        banner.textContent = '🚨 WARNUNG: Bagatellgrenze von 20 Stunden überschritten!';
      }
    }

    init();
  </script>
</body>
</html>
